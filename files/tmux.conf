# Minimal tmux config.
# Goal: jump between previous prompts in scrollback (via OSC 133), nothing more.
# Prompt marker comes from zshrc (_osc133_prompt_start).

set -g mode-keys vi
set -sg escape-time 0

# Prompt jumping — one-shot from anywhere
bind-key P copy-mode \; send-keys -X previous-prompt \; send-keys -X scroll-middle
bind-key N copy-mode \; send-keys -X next-prompt    \; send-keys -X scroll-middle

# Prompt jumping — walk through while already in copy mode
bind-key -T copy-mode-vi K send-keys -X previous-prompt \; send-keys -X scroll-middle
bind-key -T copy-mode-vi J send-keys -X next-prompt    \; send-keys -X scroll-middle
